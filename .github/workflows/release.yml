name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run mcp-deps
      - name: Check tag matches project version
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -Fq ".version = \"$version\"" build.zig.zon
          grep -Fq "pub const version = \"$version\"" packages/moo-cli/src/main.zig
          grep -Fq "\"version\": \"$version\"" apps/mcp-server/package.json
      - name: Fetch dependencies
        run: mise run fetch
      - name: Test the Linux release binary
        run: mise run test-all -- -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSafe --summary all
      - name: Build release binaries
        run: |
          mkdir -p dist
          for target in x86_64-linux-musl aarch64-linux-musl x86_64-macos aarch64-macos; do
            mise run zig -- build -Dtarget="$target" -Doptimize=ReleaseSafe -p "zig-out/$target"
            asset="moo-${target%-musl}"
            tar -czf "dist/$asset.tar.gz" -C "zig-out/$target/bin" moo moo-mcp-server
          done
      - name: Generate checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --notes "Install: \`curl -fsSL https://raw.githubusercontent.com/thehumanworks/moo/main/install.sh | sh\`"
