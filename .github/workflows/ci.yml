name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: zig fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run fmt-check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run fetch
      - run: mise run mcp-typecheck
      - run: mise run mcp-test
      - run: mise run build-debug -- --summary all
      - run: mise run test -- --summary all
      - run: mise run test-integration -- --summary all

  release-safe:
    name: test ReleaseSafe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run fetch
      - run: mise run zig -- build test-all -Doptimize=ReleaseSafe --summary all
