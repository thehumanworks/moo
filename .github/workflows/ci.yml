name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: zig fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig fmt --check build.zig build.zig.zon src test

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build --summary all
      - name: Unit tests
        run: zig build test --summary all
      - name: Integration tests (real PTY)
        run: zig build test-integration --summary all

  release-safe:
    name: test ReleaseSafe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build test-all -Doptimize=ReleaseSafe --summary all
